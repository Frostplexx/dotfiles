import = ["/Users/daniel/.config/alacritty/catppuccin-macchiato.toml"]

[colors]
draw_bold_text_with_bright_colors = true

[font]
size = 13.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Medium"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Medium Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
decorations = "buttonless"
startup_mode = "Maximized"
decorations_theme_variant = "dark"
dynamic_padding = true
opacity = 1

[window.padding]
x = 2
y = 0

[[hints.enabled]]
regex = "[^ ]+\\.rs:\\d+:\\d+"
command = { program = "code", args = [ "--goto" ] }
mouse = { enabled = true }


[shell]
program = "/bin/zsh"
args = ["-l", "-c", "tmux attach || tmux new -s main"]

[env]
TERM = "xterm-256color"
